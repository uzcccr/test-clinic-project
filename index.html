<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>МедПорт — Онлайн-система поликлиники</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #00d4ff;
      --primary-dark: #0066cc;
      --secondary: #7b6fff;
      --danger: #ff6b9d;
      --success: #00c864;
      --bg-dark: #050d1a;
      --bg-darker: #0a0f1b;
      --text-light: rgba(255,255,255,0.7);
      --text-lighter: rgba(255,255,255,0.5);
      --border: rgba(255,255,255,0.1);
      --green: #76c043;
      --blue: #1e90ff;
      --purple: #9370db;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-darker) 100%);
      color: #fff;
      min-height: 100vh;
    }

    /* ===== AUTH PAGE ===== */
    .auth-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .auth-container {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 2rem;
      background: radial-gradient(ellipse at 50% 50%, rgba(0,212,255,0.08) 0%, transparent 70%);
    }

    .auth-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(0,212,255,0.2);
      border-radius: 24px;
      padding: 3rem;
      max-width: 450px;
      width: 100%;
      backdrop-filter: blur(10px);
    }

    .auth-logo {
      font-size: 3rem;
      text-align: center;
      margin-bottom: 1rem;
    }

    .auth-box h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .auth-subtitle {
      text-align: center;
      color: var(--text-lighter);
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .demo-roles {
      background: rgba(0,212,255,0.08);
      border: 1px solid rgba(0,212,255,0.15);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      font-size: 0.85rem;
    }

    .demo-roles h3 {
      font-size: 0.9rem;
      margin: 1rem 0 0.3rem;
      color: var(--primary);
    }

    .demo-roles p {
      color: var(--text-lighter);
      margin-bottom: 0.5rem;
    }

    .auth-divider {
      text-align: center;
      color: var(--text-lighter);
      margin: 1.5rem 0;
      font-size: 0.9rem;
    }

    .features-preview {
      margin-top: 2rem;
      padding: 1.5rem;
      background: rgba(118,192,67,0.1);
      border-left: 4px solid var(--green);
      border-radius: 8px;
    }

    .features-preview h3 {
      color: var(--green);
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }

    .feature-item {
      padding: 0.4rem 0;
      color: var(--text-light);
      font-size: 0.9rem;
    }

    .articles-preview {
      padding: 3rem 2rem;
      background: linear-gradient(135deg, rgba(30,144,255,0.05), rgba(147,112,219,0.05));
      border-top: 1px solid var(--border);
    }

    .articles-preview h2 {
      text-align: center;
      margin-bottom: 2rem;
      font-size: 1.8rem;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .articles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .article-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(30,144,255,0.2);
      border-radius: 12px;
      padding: 1.5rem;
      transition: all 0.3s;
    }

    .article-card:hover {
      background: rgba(30,144,255,0.08);
      transform: translateY(-4px);
      border-color: rgba(30,144,255,0.4);
    }

    .article-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .article-card h3 {
      color: #fff;
      margin-bottom: 0.5rem;
      font-size: 1.1rem;
    }

    .article-category {
      display: inline-block;
      padding: 0.3rem 0.8rem;
      background: rgba(118,192,67,0.15);
      color: var(--green);
      border-radius: 20px;
      font-size: 0.75rem;
      margin-bottom: 0.8rem;
    }

    .article-card p {
      color: var(--text-light);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    /* ===== DASHBOARD ===== */
    .dashboard {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(10px);
    }

    .navbar-logo {
      font-size: 1.3rem;
      font-weight: 800;
    }

    .navbar-user {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .container {
      flex: 1;
      padding: 2rem 4rem;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    .container h1 {
      font-size: 2rem;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .container h2 {
      font-size: 1.5rem;
      margin: 2rem 0 1rem;
      color: #fff;
    }

    .welcome-box {
      background: linear-gradient(135deg, rgba(118,192,67,0.1), rgba(76,175,80,0.1));
      border-left: 4px solid var(--green);
      padding: 2rem;
      border-radius: 12px;
      margin-bottom: 2rem;
    }

    .welcome-box h2 {
      color: var(--green);
      margin-bottom: 0.5rem;
    }

    .welcome-box p {
      color: var(--text-light);
    }

    .stats-patient {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin: 2rem 0;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
    }

    .stat-icon {
      font-size: 2rem;
    }

    .stat-info {
      flex: 1;
    }

    .stat-number {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--green);
    }

    .stat-label {
      font-size: 0.85rem;
      color: var(--text-lighter);
      margin-top: 0.3rem;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 2rem;
      background: rgba(255,255,255,0.02);
      border: 2px dashed var(--border);
      border-radius: 12px;
      margin: 2rem 0;
    }

    .empty-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .empty-state p {
      color: var(--text-lighter);
      margin-bottom: 1.5rem;
    }

    /* ===== TABS ===== */
    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
      flex-wrap: wrap;
    }

    .tab-btn {
      background: none;
      border: none;
      color: var(--text-light);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      padding: 0.5rem 1rem;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab-btn:hover,
    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .tab-content {
      display: block;
      animation: fadeIn 0.3s;
    }

    .tab-content.hidden {
      display: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ===== FORMS ===== */
    .form-box,
    .form-group {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.9);
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255,255,255,0.03);
      color: #fff;
      font-size: 0.95rem;
      font-family: inherit;
      transition: all 0.2s;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(0,212,255,0.1);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    /* ===== BUTTONS ===== */
    .btn {
      display: inline-block;
      padding: 0.7rem 1.5rem;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
      text-decoration: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      box-shadow: 0 4px 15px rgba(0,212,255,0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,212,255,0.4);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text-light);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.12);
    }

    .btn-danger {
      background: rgba(255,107,157,0.2);
      color: var(--danger);
      border: 1px solid rgba(255,107,157,0.3);
    }

    .btn-danger:hover {
      background: rgba(255,107,157,0.3);
    }

    .btn-sm {
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
    }

    /* ===== CARDS ===== */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      transition: all 0.3s;
    }

    .card:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(0,212,255,0.3);
      transform: translateY(-4px);
    }

    .card h3 {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      color: var(--primary);
    }

    .card p {
      font-size: 0.9rem;
      color: var(--text-light);
      margin-bottom: 0.5rem;
    }

    .card .btn {
      margin-top: 1rem;
    }

    /* ===== INFO BOX ===== */
    .info-box {
      background: rgba(0,212,255,0.08);
      border: 1px solid rgba(0,212,255,0.15);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .info-box p {
      margin-bottom: 0.5rem;
      color: var(--text-light);
    }

    .info-box strong {
      color: var(--primary);
    }

    /* ===== STATS ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: linear-gradient(135deg, rgba(0,212,255,0.1), rgba(0,102,204,0.1));
      border: 1px solid rgba(0,212,255,0.2);
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 900;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }

    .stat-label {
      font-size: 0.85rem;
      color: var(--text-lighter);
    }

    /* ===== TABLE ===== */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 2rem;
    }

    .data-table th {
      background: rgba(0,212,255,0.1);
      color: var(--primary);
      padding: 1rem;
      text-align: left;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }

    .data-table td {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      color: var(--text-light);
    }

    .data-table tr:hover {
      background: rgba(0,212,255,0.05);
    }

    /* ===== BADGES ===== */
    .badge {
      display: inline-block;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      background: rgba(0,212,255,0.15);
      color: var(--primary);
    }

    .badge-success {
      background: rgba(0,200,100,0.15);
      color: var(--success);
    }

    .badge-info {
      background: rgba(0,212,255,0.15);
      color: var(--primary);
    }

    /* ===== UTILITIES ===== */
    .no-data {
      text-align: center;
      color: var(--text-lighter);
      padding: 2rem;
    }

    .hidden {
      display: none;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .container {
        padding: 1rem;
      }

      .card-grid {
        grid-template-columns: 1fr;
      }

      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .tabs {
        gap: 0.5rem;
      }

      .tab-btn {
        padding: 0.4rem 0.8rem;
        font-size: 0.85rem;
      }

      .auth-box {
        padding: 1.5rem;
      }

      table {
        font-size: 0.85rem;
      }

      .navbar {
        flex-wrap: wrap;
        gap: 1rem;
      }

      .articles-grid {
        grid-template-columns: 1fr;
      }

      .auth-page {
        padding: 0;
      }

      .articles-preview {
        padding: 2rem 1rem;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="app.js"></script>
</body>
</html>
